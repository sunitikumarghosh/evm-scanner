<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVM Unit Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
  /* Identical styling to the Apps Script version — trimmed comments for brevity */
  :root{--saffron:#FF9933;--green:#138808;--blue:#1a73e8;--red:#d93025;--gray:#f1f3f4;--dark:#202124;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Roboto,Arial,sans-serif;margin:0;background:var(--gray);color:var(--dark);}
  header{background:var(--saffron);color:#fff;padding:14px 16px;}
  header h1{font-size:18px;margin:0;}
  main{max-width:520px;margin:0 auto;padding:16px;}
  .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.12);}
  .status-grid{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
  label.chk{display:flex;align-items:center;gap:8px;font-size:14px;}
  .toolbar{display:flex;gap:8px;margin:10px 0;}
  .toolbar button{flex:1;padding:8px;border:1px solid #ccc;background:#fff;border-radius:8px;cursor:pointer;}
  button.primary{background:var(--green);color:#fff;border:none;padding:12px 16px;border-radius:10px;font-size:16px;width:100%;cursor:pointer;}
  button.secondary{background:#5f6368;color:#fff;border:none;padding:10px 16px;border-radius:10px;font-size:15px;width:100%;cursor:pointer;margin-top:8px;}
  #reader{width:100%;max-height:230px;border-radius:12px;overflow:hidden;margin-top:12px;background:#000;}
  #reader video{width:100% !important;height:230px !important;object-fit:cover !important;}
  #resultCard{display:none;}
  #resultCard.show{display:block;}
  .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;margin-bottom:8px;}
  .badge.found{background:var(--green);}.badge.scanned{background:var(--blue);}
  .badge.duplicate{background:#f29900;}.badge.not_found{background:var(--red);}
  #resultCard.found{border:3px solid var(--green);}#resultCard.scanned{border:3px solid var(--blue);}
  #resultCard.duplicate{border:3px solid #f29900;}#resultCard.not_found{border:3px solid var(--red);}
  .field-row{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;border-bottom:1px solid #eee;}
  .msg{padding:10px;border-radius:8px;font-size:14px;margin-top:8px;}
  .msg.error{background:#fce8e6;color:var(--red);}
  input[type=text]{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin-top:6px;}
</style>
</head>
<body>
<header><h1>EVM Unit Scanner</h1></header>
<main>
  <div class="card">
    <h2>1. Select Status to check for</h2>
    <div class="toolbar">
      <button id="selAll">Select All</button>
      <button id="selNone">Clear All</button>
    </div>
    <div class="status-grid" id="statusGrid"></div>
  </div>

  <div class="card">
    <h2>2. Scan Barcode</h2>
    <button class="primary" id="startBtn">Start Camera</button>
    <button class="secondary" id="diagBtn">Check Camera Access (diagnostic)</button>
    <div id="cameraMsg"></div>
    <div id="reader"></div>
    <button class="secondary" id="stopBtn" style="display:none;">Stop Camera</button>
  </div>

  <div class="card" id="resultCard">
    <span class="badge" id="resultBadge"></span>
    <h2 id="resultMsg"></h2>
    <div id="resultFields"></div>
    <button class="primary" id="scanNextBtn" style="margin-top:12px;">Scan Next</button>
  </div>
</main>

<script>
/* =========================================================
   IMPORTANT: paste your Apps Script Web App /exec URL below
   ========================================================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbzx6N0pea302LcEMyZmMuiiz1Z7xq111v11vInEg7vt4NfTcCP0ZIhiQelOYn9rkzFycA/exec';

let selectedStatuses = [];
let html5QrCode;
let scanningLocked = false;

/* ---------- API call helper (avoids CORS preflight by using text/plain) ---------- */
async function callApi(action, payload){
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // deliberately NOT application/json
    body: JSON.stringify(Object.assign({ action }, payload || {}))
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Unknown API error');
  return json.data;
}

/* ---------- Load status options ---------- */
callApi('getStatusOptions').then(renderStatusOptions).catch(err => alert('Failed to load status list: ' + err.message));

function renderStatusOptions(list){
  document.getElementById('statusGrid').innerHTML = list.map(s => `
    <label class="chk"><input type="checkbox" class="statusChk" value="${s}"> ${s}</label>`).join('');
}
document.getElementById('selAll').onclick = () => setAllChecks(true);
document.getElementById('selNone').onclick = () => setAllChecks(false);
function setAllChecks(val){ document.querySelectorAll('.statusChk').forEach(c => c.checked = val); }
function getSelectedStatuses(){ return Array.from(document.querySelectorAll('.statusChk:checked')).map(c => c.value); }

/* ---------- Camera ---------- */
document.getElementById('startBtn').onclick = startScanner;
document.getElementById('stopBtn').onclick = stopScanner;
document.getElementById('diagBtn').onclick = runCameraDiagnostic;
document.getElementById('scanNextBtn').onclick = () => {
  document.getElementById('resultCard').classList.remove('show','found','scanned','duplicate','not_found');
  scanningLocked = false;
  startScanner();
};

async function runCameraDiagnostic(){
  const box = document.getElementById('cameraMsg');
  let html = `<div class="msg" style="background:#e8f0fe;"><b>Page origin:</b> ${location.origin}<br>`;
  if (navigator.permissions && navigator.permissions.query){
    try{ const st = await navigator.permissions.query({name:'camera'}); html += `<b>Permission state:</b> ${st.state}<br>`; }catch(e){}
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    html += `<b>Result:</b> ✅ Camera GRANTED for this page.`;
    stream.getTracks().forEach(t => t.stop());
  }catch(err){
    html += `<b>Result:</b> ❌ ${err.name}: ${err.message}`;
  }
  box.innerHTML = html + '</div>';
}

function startScanner(){
  selectedStatuses = getSelectedStatuses();
  if (selectedStatuses.length === 0){ alert('Please select at least one Status before scanning.'); return; }
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  document.getElementById('cameraMsg').innerHTML = '';

  html5QrCode = new Html5Qrcode("reader");

  const config = {
    fps: 25,
    qrbox: function(viewfinderWidth, viewfinderHeight) {
      // Capture box fills ~90% of preview width, ~65% of preview height
      const boxWidth = Math.floor(viewfinderWidth * 0.9);
      const boxHeight = Math.floor(viewfinderHeight * 0.65);
      return { width: boxWidth, height: boxHeight };
    },
    aspectRatio: 1.77,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.QR_CODE
    ]
  };

  html5QrCode.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    () => {}
  ).catch(err => {
    document.getElementById('cameraMsg').innerHTML =
      `<div class="msg error">${err.name || ''}: ${err.message || err}</div>`;
    resetScanButtons();
  });
}
function stopScanner(){
  if (html5QrCode) html5QrCode.stop().then(() => html5QrCode.clear()).catch(()=>{});
  resetScanButtons();
}
function resetScanButtons(){
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
}

async function onScanSuccess(decodedText){
  if (scanningLocked) return;
  scanningLocked = true;
  if (html5QrCode) html5QrCode.pause(true);
  try{
    const res = await callApi('processScan', { unitId: decodedText.trim(), selectedStatuses });
    showResult(res);
  }catch(err){
    showResult({ result:'not_found', message:'Error: ' + err.message });
  }
}

function showResult(res){
  const card = document.getElementById('resultCard');
  card.classList.remove('found','scanned','duplicate','not_found');
  card.classList.add('show', res.result);
  document.getElementById('resultBadge').className = 'badge ' + res.result;
  document.getElementById('resultBadge').textContent = res.result.toUpperCase().replace('_',' ');
  document.getElementById('resultMsg').textContent = res.message;

  const fieldsDiv = document.getElementById('resultFields');
  fieldsDiv.innerHTML = '';
  if (res.unit){
    ['unit_id','box_no','status','wh_id','wh_address','unittypename','ac_no_name','ps_no'].forEach(key => {
      if (res.unit[key] !== undefined){
        fieldsDiv.innerHTML += `<div class="field-row"><b>${key}</b><span>${res.unit[key]}</span></div>`;
      }
    });
  }
  alertUser(res.result);
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('startBtn').style.display='none';
  card.scrollIntoView({behavior:'smooth'});
}

function alertUser(result){
  const patterns = { found:[200,80,200,80,200], scanned:[120], duplicate:[100,60,100,60,100,60,100], not_found:[500] };
  if (navigator.vibrate) navigator.vibrate(patterns[result] || [150]);
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqMap = {found:880, scanned:440, duplicate:300, not_found:180};
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.frequency.value = freqMap[result] || 400;
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    osc.start(); osc.stop(ctx.currentTime + 0.35);
  }catch(e){}
}
</script>
</body>
</html>
