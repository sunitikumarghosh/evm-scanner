<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EVM Unit Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
  /* Identical styling to the Apps Script version — trimmed comments for brevity */
  :root{--saffron:#FF9933;--green:#138808;--blue:#1a73e8;--red:#d93025;--gray:#f1f3f4;--dark:#202124;}
  *{box-sizing:border-box;}
  body{font-family:'Segoe UI',Roboto,Arial,sans-serif;margin:0;background:var(--gray);color:var(--dark);}
  header{background:var(--saffron);color:#fff;padding:12px 16px;}
  header h1{font-size:17px;margin:0;}
  main{max-width:520px;margin:0 auto;padding:12px;}
  .card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.12);}
  .card h2{margin:0 0 8px 0;font-size:15px;}
  .status-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .status-header .chev{font-size:13px;color:var(--blue);font-weight:600;}
  .status-summary{font-size:12.5px;color:#555;margin-top:4px;line-height:1.5;}
  .status-summary b{color:var(--dark);}
  .status-body{margin-top:8px;}
  .status-body.collapsed{display:none;}
  .status-grid{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;}
  label.chk{display:flex;align-items:center;gap:8px;font-size:14px;}
  .toolbar{display:flex;gap:8px;margin:8px 0;}
  .toolbar button{flex:1;padding:7px;border:1px solid #ccc;background:#fff;border-radius:8px;cursor:pointer;font-size:13px;}
  button.primary{background:var(--green);color:#fff;border:none;padding:12px 16px;border-radius:10px;font-size:16px;width:100%;cursor:pointer;}
  button.secondary{background:#5f6368;color:#fff;border:none;padding:10px 16px;border-radius:10px;font-size:15px;width:100%;cursor:pointer;margin-top:8px;}
  .diag-link{display:block;text-align:center;font-size:12.5px;color:#5f6368;margin-top:8px;text-decoration:underline;cursor:pointer;}
  #reader{width:100%;max-height:230px;border-radius:12px;overflow:hidden;margin-top:10px;background:#000;}
  #reader video{width:100% !important;height:230px !important;object-fit:cover !important;}

  /* ---------- RESULT CARD: made highly visible ---------- */
  #resultCard{display:none;}
  #resultCard.show{display:block; animation: popIn .25s ease-out;}
  @keyframes popIn{0%{transform:scale(.92);opacity:0;}100%{transform:scale(1);opacity:1;}}

  #resultCard{border:4px solid #ccc; padding:16px;}
  #resultCard.found{border-color:var(--green); background:#e9f9ee;}
  #resultCard.scanned{border-color:var(--blue); background:#eaf2fe;}
  #resultCard.duplicate{border-color:#f29900; background:#fff4e0;}
  #resultCard.not_found{border-color:var(--red); background:#fdeceb;}

  .badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:800;letter-spacing:.5px;color:#fff;margin-bottom:10px;}
  .badge.found{background:var(--green);}.badge.scanned{background:var(--blue);}
  .badge.duplicate{background:#f29900;}.badge.not_found{background:var(--red);}

  #resultUnitId{font-family:'Courier New',monospace;font-size:26px;font-weight:800;letter-spacing:1px;margin:2px 0 6px 0;}
  #resultMsg{font-size:18px;font-weight:700;margin:0 0 10px 0;line-height:1.3;}
  #resultMsg.found{color:var(--green);}#resultMsg.scanned{color:var(--blue);}
  #resultMsg.duplicate{color:#b56b00;}#resultMsg.not_found{color:var(--red);}

  .field-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;border-bottom:1px solid rgba(0,0,0,.08);}
  .field-row.status-field{background:#fff;border-radius:8px;padding:8px 10px;margin:6px 0;border:none;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .field-row.status-field span{font-weight:800;font-size:16px;}
  .field-row.status-field.found span{color:var(--green);}
  .field-row.status-field.scanned span{color:var(--blue);}
  .field-row.status-field.duplicate span{color:#b56b00;}

  .msg{padding:10px;border-radius:8px;font-size:14px;margin-top:8px;}
  .msg.error{background:#fce8e6;color:var(--red);}
  .msg.success{background:#e6f4ea;color:var(--green);}
  input[type=text], input[type=password], select{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:15px;margin-top:6px;}
  .small{font-size:12px;color:#666;}

  /* ---------- Tabs / Admin panel ---------- */
  .tabbar{display:flex;background:#fff;border-bottom:1px solid #ddd;}
  .tabbar button{flex:1;padding:12px;border:none;background:none;font-size:13px;font-weight:700;color:#888;cursor:pointer;}
  .tabbar button.active{color:var(--saffron);border-bottom:3px solid var(--saffron);}
  #adminPanel, #scanPanel, #reportPanel{display:none;}
  #adminPanel.active, #scanPanel.active, #reportPanel.active{display:block;}

  /* ---------- Report table ---------- */
  .report-table{width:100%;border-collapse:collapse;margin-top:10px;}
  .report-table th, .report-table td{border:1px solid #e2e2e2;padding:8px 6px;text-align:center;font-size:13px;}
  .report-table th{background:var(--gray);font-weight:700;}
  .report-table td.letter-cell{background:#fafafa;font-weight:800;text-align:left;padding-left:10px;}
  .report-table td.count-cell{cursor:pointer;font-weight:700;color:var(--blue);}
  .report-table td.count-cell.zero{color:#bbb;cursor:default;font-weight:400;}
  .report-table td.count-cell:not(.zero):active{background:#dbeafe;}
  .drill-row{display:flex;justify-content:space-between;padding:6px 4px;font-size:13px;border-bottom:1px solid #eee;}
  .drill-header{display:flex;justify-content:space-between;padding:6px 4px;font-size:12px;font-weight:700;color:#666;border-bottom:2px solid #ccc;}
  #drillList{max-height:320px;overflow-y:auto;margin-top:8px;}
</style>
</head>
<body>
<header><h1>EVM Unit Scanner</h1></header>
<div class="tabbar">
  <button id="tabScan" class="active">🔍 Scan</button>
  <button id="tabReport">📊 Report</button>
  <button id="tabAdmin">🔐 Admin</button>
</div>
<main>

  <!-- ===================== SCAN PANEL ===================== -->
  <div id="scanPanel" class="active">
    <div class="card">
      <div class="status-header" id="statusHeader">
        <h2 style="margin:0;">1. Status to check for</h2>
        <span class="chev" id="statusChev">Change ▾</span>
      </div>
      <div class="status-summary" id="statusSummary" style="display:none;"></div>
      <div class="status-body" id="statusBody">
        <div class="toolbar">
          <button id="selAll">Select All</button>
          <button id="selNone">Clear All</button>
        </div>
        <div class="status-grid" id="statusGrid"></div>
      </div>
    </div>

    <div class="card">
      <h2>2. Scan Barcode</h2>
      <button class="primary" id="startBtn">Start Camera</button>
      <div id="cameraMsg"></div>
      <div id="reader"></div>
      <button class="secondary" id="stopBtn" style="display:none;">Stop Camera</button>
      <span class="diag-link" id="diagBtn">Camera not working? Tap to diagnose</span>
    </div>

    <div class="card" id="resultCard">
      <span class="badge" id="resultBadge"></span>
      <div id="resultUnitId"></div>
      <h2 id="resultMsg"></h2>
      <div id="resultFields"></div>
      <button class="primary" id="scanNextBtn" style="margin-top:12px;">Scan Next</button>
    </div>
  </div>

  <!-- ===================== REPORT PANEL ===================== -->
  <div id="reportPanel">
    <div class="card">
      <h2>AC-wise Status Report</h2>
      <div id="reportLoadMsg" class="small">Loading report…</div>
      <select id="acSelect" style="display:none;"></select>
      <div id="reportTableWrap"></div>
    </div>

    <div class="card" id="drillCard" style="display:none;">
      <h2 id="drillTitle"></h2>
      <div class="drill-header">
        <span>Unit ID</span><span>Box No</span><span>AC No/Name</span><span>PS No</span>
      </div>
      <div id="drillList"></div>
    </div>
  </div>

  <!-- ===================== ADMIN PANEL ===================== -->
  <div id="adminPanel">
    <div class="card" id="loginCard">
      <h2>Admin Login</h2>
      <input type="password" id="adminPass" placeholder="Enter admin password">
      <button class="primary" id="loginBtn" style="margin-top:10px;">Login</button>
      <div id="loginMsg"></div>
    </div>

    <div class="card" id="adminSearchCard" style="display:none;">
      <h2>Search Unit by ID</h2>
      <input type="text" id="adminUnitId" placeholder="Enter / paste unit_id">
      <button class="secondary" id="adminSearchBtn">Search</button>
      <div id="adminResult" style="margin-top:10px;"></div>

      <div id="markEditBlock" style="display:none; margin-top:14px;">
        <b>Change Mark:</b>
        <select id="markSelect">
          <option value="">(blank / clear)</option>
          <option value="Scanned">Scanned</option>
          <option value="Rechecked">Rechecked</option>
        </select>
        <button class="primary" id="markUpdateBtn" style="margin-top:10px;">Update Mark</button>
        <div id="markUpdateMsg"></div>
      </div>
      <p class="small">Admin can also use the Scan tab at any time.</p>
    </div>
  </div>

</main>

<script>
/* =========================================================
   IMPORTANT: paste your Apps Script Web App /exec URL below
   ========================================================= */
const API_URL = 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

let selectedStatuses = [];
let html5QrCode;
let scanningLocked = false;
let adminPassword = null; // kept only in this browser session

/* ---------- TABS ---------- */
document.getElementById('tabScan').onclick = () => switchTab('scan');
document.getElementById('tabReport').onclick = () => switchTab('report');
document.getElementById('tabAdmin').onclick = () => switchTab('admin');
function switchTab(tab){
  document.getElementById('scanPanel').classList.toggle('active', tab === 'scan');
  document.getElementById('reportPanel').classList.toggle('active', tab === 'report');
  document.getElementById('adminPanel').classList.toggle('active', tab === 'admin');
  document.getElementById('tabScan').classList.toggle('active', tab === 'scan');
  document.getElementById('tabReport').classList.toggle('active', tab === 'report');
  document.getElementById('tabAdmin').classList.toggle('active', tab === 'admin');
  if (tab === 'report' && !reportData) loadReport();
}

/* ---------- API call helper (avoids CORS preflight by using text/plain) ---------- */
async function callApi(action, payload){
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // deliberately NOT application/json
    body: JSON.stringify(Object.assign({ action }, payload || {}))
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Unknown API error');
  return json.data;
}

/* ---------- Load status options ---------- */
callApi('getStatusOptions').then(renderStatusOptions).catch(err => alert('Failed to load status list: ' + err.message));

function renderStatusOptions(list){
  document.getElementById('statusGrid').innerHTML = list.map(s => `
    <label class="chk"><input type="checkbox" class="statusChk" value="${s}"> ${s}</label>`).join('');
  updateStatusSummary();
}
document.getElementById('selAll').onclick = () => { setAllChecks(true); updateStatusSummary(); };
document.getElementById('selNone').onclick = () => { setAllChecks(false); updateStatusSummary(); };
function setAllChecks(val){ document.querySelectorAll('.statusChk').forEach(c => c.checked = val); }
function getSelectedStatuses(){ return Array.from(document.querySelectorAll('.statusChk:checked')).map(c => c.value); }

/* ---------- Collapsible status section ---------- */
const statusHeader = document.getElementById('statusHeader');
const statusBody = document.getElementById('statusBody');
const statusSummary = document.getElementById('statusSummary');
const statusChev = document.getElementById('statusChev');
let statusOpen = true;

statusHeader.onclick = () => { statusOpen = !statusOpen; renderStatusCollapse(); };

function renderStatusCollapse(){
  statusBody.classList.toggle('collapsed', !statusOpen);
  statusSummary.style.display = statusOpen ? 'none' : 'block';
  statusChev.textContent = statusOpen ? 'Collapse ▴' : 'Change ▾';
}

function updateStatusSummary(){
  const sel = getSelectedStatuses();
  statusSummary.innerHTML = sel.length
    ? `<b>${sel.length} selected:</b> ${sel.join(', ')}`
    : '<b>No status selected</b>';
}

document.getElementById('statusGrid').addEventListener('change', updateStatusSummary);

/* ---------- Camera ---------- */
document.getElementById('startBtn').onclick = startScanner;
document.getElementById('stopBtn').onclick = stopScanner;
document.getElementById('diagBtn').onclick = runCameraDiagnostic;
document.getElementById('scanNextBtn').onclick = () => {
  document.getElementById('resultCard').classList.remove('show','found','scanned','duplicate','not_found');
  scanningLocked = false;
  startScanner();
};

async function runCameraDiagnostic(){
  const box = document.getElementById('cameraMsg');
  let html = `<div class="msg" style="background:#e8f0fe;"><b>Page origin:</b> ${location.origin}<br>`;
  if (navigator.permissions && navigator.permissions.query){
    try{ const st = await navigator.permissions.query({name:'camera'}); html += `<b>Permission state:</b> ${st.state}<br>`; }catch(e){}
  }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({video:true});
    html += `<b>Result:</b> ✅ Camera GRANTED for this page.`;
    stream.getTracks().forEach(t => t.stop());
  }catch(err){
    html += `<b>Result:</b> ❌ ${err.name}: ${err.message}`;
  }
  box.innerHTML = html + '</div>';
}

function startScanner(){
  selectedStatuses = getSelectedStatuses();
  if (selectedStatuses.length === 0){ alert('Please select at least one Status before scanning.'); return; }

  // Collapse the status picker now that scanning has begun — saves scroll space
  statusOpen = false;
  updateStatusSummary();
  renderStatusCollapse();

  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='block';
  document.getElementById('cameraMsg').innerHTML = '';

  html5QrCode = new Html5Qrcode("reader");

  const config = {
    fps: 25,
    qrbox: function(viewfinderWidth, viewfinderHeight) {
      // Capture box fills ~90% of preview width, ~65% of preview height
      const boxWidth = Math.floor(viewfinderWidth * 0.9);
      const boxHeight = Math.floor(viewfinderHeight * 0.65);
      return { width: boxWidth, height: boxHeight };
    },
    aspectRatio: 1.77,
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.QR_CODE
    ]
  };

  html5QrCode.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    () => {}
  ).catch(err => {
    document.getElementById('cameraMsg').innerHTML =
      `<div class="msg error">${err.name || ''}: ${err.message || err}</div>`;
    resetScanButtons();
  });
}
function stopScanner(){
  if (html5QrCode) html5QrCode.stop().then(() => html5QrCode.clear()).catch(()=>{});
  resetScanButtons();
}
function resetScanButtons(){
  document.getElementById('startBtn').style.display='block';
  document.getElementById('stopBtn').style.display='none';
}

async function onScanSuccess(decodedText){
  if (scanningLocked) return;
  scanningLocked = true;
  if (html5QrCode) html5QrCode.pause(true);
  const cleanId = decodedText.trim();
  try{
    const res = await callApi('processScan', { unitId: cleanId, selectedStatuses });
    if (!res.unit) res.scannedId = cleanId;
    showResult(res);
  }catch(err){
    showResult({ result:'not_found', message:'Error: ' + err.message, scannedId: cleanId });
  }
}

function showResult(res){
  const card = document.getElementById('resultCard');
  card.classList.remove('found','scanned','duplicate','not_found');
  card.classList.add('show', res.result);

  document.getElementById('resultBadge').className = 'badge ' + res.result;
  document.getElementById('resultBadge').textContent = res.result.toUpperCase().replace('_',' ');

  document.getElementById('resultUnitId').textContent = res.unit ? res.unit.unit_id : (res.scannedId || '');

  const msgEl = document.getElementById('resultMsg');
  msgEl.className = res.result;
  msgEl.textContent = res.message;

  const fieldsDiv = document.getElementById('resultFields');
  fieldsDiv.innerHTML = '';
  if (res.unit){
    const order = ['status','box_no','wh_id','wh_address','unittypename','ac_no_name','ps_no'];
    order.forEach(key => {
      if (res.unit[key] !== undefined){
        if (key === 'status'){
          fieldsDiv.innerHTML += `<div class="field-row status-field ${res.result}">
            <b>Status</b><span>${res.unit[key]}</span></div>`;
        } else {
          fieldsDiv.innerHTML += `<div class="field-row"><b>${key}</b><span>${res.unit[key]}</span></div>`;
        }
      }
    });
  }
  alertUser(res.result);
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('startBtn').style.display='none';
  card.scrollIntoView({behavior:'smooth'});
}

function alertUser(result){
  const patterns = { found:[200,80,200,80,200], scanned:[120], duplicate:[100,60,100,60,100,60,100], not_found:[500] };
  if (navigator.vibrate) navigator.vibrate(patterns[result] || [150]);
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqMap = {found:880, scanned:440, duplicate:300, not_found:180};
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.frequency.value = freqMap[result] || 400;
    osc.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    osc.start(); osc.stop(ctx.currentTime + 0.35);
  }catch(e){}
}

/* ---------- ADMIN ---------- */
document.getElementById('loginBtn').onclick = async () => {
  const pass = document.getElementById('adminPass').value;
  const msg = document.getElementById('loginMsg');
  try{
    const ok = await callApi('adminLogin', { password: pass });
    if (ok){
      adminPassword = pass;
      msg.innerHTML = '';
      document.getElementById('loginCard').style.display='none';
      document.getElementById('adminSearchCard').style.display='block';
    } else {
      msg.innerHTML = '<div class="msg error">Incorrect password.</div>';
    }
  }catch(err){
    msg.innerHTML = '<div class="msg error">' + err.message + '</div>';
  }
};

document.getElementById('adminSearchBtn').onclick = async () => {
  const unitId = document.getElementById('adminUnitId').value.trim();
  if (!unitId) return;
  const div = document.getElementById('adminResult');
  try{
    const data = await callApi('adminSearchUnit', { password: adminPassword, unitId });
    renderAdminResult(data);
  }catch(err){
    div.innerHTML = '<div class="msg error">' + err.message + '</div>';
    document.getElementById('markEditBlock').style.display = 'none';
  }
};

let currentAdminUnitId = null;
function renderAdminResult(data){
  const div = document.getElementById('adminResult');
  const markBlock = document.getElementById('markEditBlock');
  if (!data){
    div.innerHTML = '<div class="msg error">Unit ID not found.</div>';
    markBlock.style.display = 'none';
    return;
  }
  currentAdminUnitId = data.unit_id;
  const order = ['unit_id','box_no','status','wh_id','wh_address','unittypename','ac_no_name','ps_no','mark'];
  div.innerHTML = order.map(k => data[k] !== undefined
    ? `<div class="field-row"><b>${k}</b><span>${data[k]}</span></div>` : '').join('');
  document.getElementById('markSelect').value =
    ['','Scanned','Rechecked'].includes(data.mark) ? data.mark : '';
  markBlock.style.display = 'block';
}

document.getElementById('markUpdateBtn').onclick = async () => {
  if (!currentAdminUnitId) return;
  const newMark = document.getElementById('markSelect').value;
  const msgDiv = document.getElementById('markUpdateMsg');
  try{
    const res = await callApi('adminUpdateMark', { password: adminPassword, unitId: currentAdminUnitId, newMark });
    msgDiv.innerHTML = '<div class="msg success">' + res.message + '</div>';
  }catch(err){
    msgDiv.innerHTML = '<div class="msg error">' + err.message + '</div>';
  }
};

/* ---------- REPORT (AC-wise status-letter x unittype counts) ---------- */
let reportData = null; // cached after first load — no repeat server calls

async function loadReport(){
  const loadMsg = document.getElementById('reportLoadMsg');
  loadMsg.textContent = 'Loading report…';
  loadMsg.style.display = 'block';
  document.getElementById('acSelect').style.display = 'none';
  try{
    reportData = await callApi('getGroupedReport');
    populateAcSelect();
    loadMsg.style.display = 'none';
    document.getElementById('acSelect').style.display = 'block';
  }catch(err){
    loadMsg.textContent = 'Failed to load report: ' + err.message;
  }
}

function populateAcSelect(){
  const sel = document.getElementById('acSelect');
  sel.innerHTML = '<option value="">— Select AC/PC —</option>' +
    reportData.acList.map(ac => `<option value="${ac}">${ac}</option>`).join('');
  sel.onchange = () => renderReportTable(sel.value);
}

function renderReportTable(ac){
  const wrap = document.getElementById('reportTableWrap');
  document.getElementById('drillCard').style.display = 'none';
  if (!ac){ wrap.innerHTML = ''; return; }

  const { letters, unitTypes, data } = reportData;
  const acData = data[ac] || {};

  let html = '<table class="report-table"><tr><th>Status</th>' +
    unitTypes.map(u => `<th>${u}</th>`).join('') + '</tr>';

  letters.forEach(letter => {
    html += `<tr><td class="letter-cell">${letter}</td>`;
    unitTypes.forEach(u => {
      const cell = acData[letter] && acData[letter][u];
      const count = cell ? cell.count : 0;
      if (count > 0){
        html += `<td class="count-cell" onclick="showDrill('${escapeJs(ac)}','${letter}','${escapeJs(u)}')">${count}</td>`;
      } else {
        html += `<td class="count-cell zero">-</td>`;
      }
    });
    html += '</tr>';
  });
  html += '</table>';
  wrap.innerHTML = html;
}

function escapeJs(s){ return String(s).replace(/'/g, "\\'"); }

function showDrill(ac, letter, unitType){
  const cell = reportData.data[ac] && reportData.data[ac][letter] && reportData.data[ac][letter][unitType];
  const rows = cell ? cell.rows : [];
  document.getElementById('drillTitle').textContent = `${ac} — ${letter} — ${unitType} (${rows.length})`;
  document.getElementById('drillList').innerHTML = rows.map(r => `
    <div class="drill-row">
      <span>${r.unit_id}</span><span>${r.box_no}</span><span>${r.ac_no_name}</span><span>${r.ps_no}</span>
    </div>`).join('');
  const card = document.getElementById('drillCard');
  card.style.display = 'block';
  card.scrollIntoView({behavior:'smooth'});
}

</script>
</body>
</html>
